# Named Ender Chests - Forge 1.21.1 mods.toml
modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
displayURL="https://github.com/KURONAMI333/named-ender-chests"
issueTrackerURL="https://github.com/KURONAMI333/named-ender-chests/issues"
description='''
${mod_description}
'''

# No [[mixins]]: Named Ender Chests rides vanilla place/break/right-click
# listeners + a SavedData channel store. Unnamed ender chests are never
# touched (pure vanilla path).

[[dependencies.${mod_id}]]
    modId="forge"
    type="required"
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
